<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Mr KN — Full-Stack Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Mr KN — Senior Full-Stack Engineer. Banking-grade Angular, .NET Core, SQL Server, Kubernetes, Control-M. 10+ years across investment banking, transit, and enterprise."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4cc9e0" />

    <!--
      Content Security Policy
      Defense-in-depth: the same headers are also set in nginx.conf for the Docker deployment.
      Keep this conservative; loosen only when a specific resource demands it.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
