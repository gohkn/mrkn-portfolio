<header class="header">
  <a routerLink="/" class="logo-pill" aria-label="Home">
    <span>MR</span>
    <span>KN</span>
  </a>
  <div class="header-actions">
    <a
      routerLink="/contact"
      class="icon-btn"
      matRipple
      [matRippleCentered]="true"
      aria-label="Contact"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <rect x="3" y="5" width="18" height="14" rx="2" />
        <path d="m3 7 9 6 9-6" />
      </svg>
    </a>
    <div class="header-divider" aria-hidden="true"></div>
    <a
      href="https://linkedin.com/in/gohkhaining"
      target="_blank"
      rel="noopener noreferrer"
      class="icon-btn"
      matRipple
      [matRippleCentered]="true"
      aria-label="LinkedIn"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"
        />
      </svg>
    </a>
  </div>
</header>
