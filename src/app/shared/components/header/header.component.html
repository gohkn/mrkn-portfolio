<header class="header">
  <a routerLink="/" class="logo-pill" aria-label="Home">
    <span>MR</span>
    <span>KN</span>
  </a>
  <div class="header-actions">
    <a
      routerLink="/contact"
      class="icon-btn"
      matRipple
      [matRippleCentered]="true"
      aria-label="Contact"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <rect x="3" y="5" width="18" height="14" rx="2" />
        <path d="m3 7 9 6 9-6" />
      </svg>
    </a>
    <div class="header-divider" aria-hidden="true"></div>
    <a
      href="#"
      class="icon-btn"
      matRipple
      [matRippleCentered]="true"
      aria-label="Download Resume"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M14 3v4a1 1 0 0 0 1 1h4" />
        <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" />
        <path d="M12 11v6" />
        <path d="m9 14 3 3 3-3" />
      </svg>
    </a>
  </div>
</header>
