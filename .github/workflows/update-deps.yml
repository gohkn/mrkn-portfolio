name: Update Angular Dependencies

on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Update Angular packages
        run: npm update @angular/animations @angular/cdk @angular/common @angular/compiler @angular/core @angular/forms @angular/material @angular/platform-browser @angular/router
      - name: Audit fix
        run: npm audit fix || true
      - name: Verify audit is clean
        run: npm audit --omit=dev --audit-level=high
      - name: Build check
        run: npm run build
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update Angular packages to patch npm audit CVE"
            git push
          else
            echo "No changes to commit"
          fi
