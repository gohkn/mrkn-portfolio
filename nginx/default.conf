# =========================================================
# Mr KN Portfolio — Nginx site config
# Security headers, SPA routing, aggressive static caching
# =========================================================

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Apply rate limit
    limit_req zone=general burst=20 nodelay;

    # ----- Security headers -----
    # Same CSP as the meta tag in index.html (defence in depth)
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # MIME-sniffing protection
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy (formerly Feature-Policy)
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # HSTS - only enable when serving over HTTPS at the edge (load balancer / Cloudflare)
    # Uncomment when ready:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Remove server header
    add_header Server "" always;

    # ----- Asset caching -----
    # Angular outputs hashed filenames in production, so we can cache forever
    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|webp|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";

        # Re-apply security headers (add_header inheritance is replaced when used in nested blocks)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        try_files $uri =404;
    }

    # index.html and the SPA fallback must NOT be cached aggressively,
    # or users will be stuck on the old build after deploys
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # ----- SPA fallback -----
    # All unknown paths return index.html so the Angular router can take over
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Deny dotfiles (e.g. .git, .env) -----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ----- Block common probe paths -----
    location ~* (wp-admin|wp-login|phpmyadmin|\.php$) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Custom 404 - delegates to SPA so client-side router can show a 404 page if desired
    error_page 404 /index.html;
}
